<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epitracker - Epidemiology Data</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f0f2f5; color: #1a1a1b; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 3px solid #27ae60; padding-bottom: 15px; }
        .status-box { background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 20px; font-weight: bold; }
        .table-wrapper { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background-color: #27ae60; color: white; padding: 15px; text-align: left; text-transform: uppercase; font-size: 0.85em; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.95em; }
        tr:hover { background-color: #f9f9f9; }
        .error-msg { color: #d32f2f; background: #ffebee; padding: 20px; border-radius: 8px; border: 1px solid #ffcdd2; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Epitracker Database</h1>
        <div class="status-box">Live Health Data Registry</div>
        
        <div class="table-wrapper" id="table-container">
            <p style="text-align: center;">Reading data from 127_0_0_1 (8).json...</p>
        </div>
    </div>

    <script>
        // THIS LINE MATCHES YOUR FILENAME EXACTLY
        const dataFile = '127_0_0_1 (8).json'; 

        async function loadTable() {
            try {
                const response = await fetch(dataFile);
                if (!response.ok) throw new Error('File not found');
                
                const rawData = await response.json();
                
                // phpMyAdmin JSON exports often put the data inside an array named 'data' or 'table_name'
                // We check if it's a direct array or nested
                let data = Array.isArray(rawData) ? rawData : (rawData[2] && rawData[2].data ? rawData[2].data : Object.values(rawData)[0]);

                if (!data || data.length === 0) {
                    document.getElementById('table-container').innerHTML = "<p>The file is empty or formatted incorrectly.</p>";
                    return;
                }

                let tableHtml = '<table><thead><tr>';
                
                // Build Headers
                Object.keys(data[0]).forEach(key => {
                    tableHtml += `<th>${key.replace(/_/g, ' ')}</th>`;
                });
                tableHtml += '</tr></thead><tbody>';

                // Build Rows
                data.forEach(row => {
                    tableHtml += '<tr>';
                    Object.values(row).forEach(val => {
                        tableHtml += `<td>${val !== null ? val : '-'}</td>`;
                    });
                    tableHtml += '</tr>';
                });
                tableHtml += '</tbody></table>';

                document.getElementById('table-container').innerHTML = tableHtml;
            } catch (error) {
                console.error(error);
                document.getElementById('table-container').innerHTML = `
                    <div class="error-msg">
                        <strong>Cannot Load Data</strong><br>
                        Make sure the file <b>127_0_0_1 (8).json</b> is uploaded to the same folder as this index.html file.
                    </div>`;
            }
        }

        loadTable();
    </script>
</body>
</html>
